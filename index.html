<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シャリオ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="./schedule.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap');

  :root {
    --bg:       #0d0d0d;
    --surface:  #161616;
    --surface2: #1f1f1f;
    --border:   #2a2a2a;
    --accent:   #c8a96e;
    --red:      #e63946;
    --green:    #4caf82;
    --text:     #e8e0d0;
    --dim:      #7a7060;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,13,13,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { font-family: 'Noto Serif JP', serif; font-size: 20px; font-weight: 900; color: var(--accent); letter-spacing: .15em; }
  .logo span { color: var(--dim); font-size: 12px; font-weight: 400; margin-left: 12px; }
  nav { display: flex; gap: 4px; overflow-x: auto; flex-wrap: nowrap; }
  nav button { white-space: nowrap; flex-shrink: 0; }
  nav button {
    background: none; border: none; color: var(--dim);
    font-family: 'Noto Sans JP', sans-serif; font-size: 13px;
    padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all .2s;
  }
  nav button:hover { color: var(--text); background: var(--surface2); }
  nav button.active { color: var(--accent); background: var(--surface2); }

  /* PERIOD FILTER BAR */
  .period-bar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .period-bar label { font-size: 12px; color: var(--dim); }
  .period-bar input[type=date] {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 13px;
    padding: 5px 10px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer;
  }
  .period-bar input[type=date]:focus { outline: none; border-color: var(--accent); }
  .period-sep { color: var(--dim); }
  .period-btns { display: flex; gap: 6px; margin-left: 8px; }
  .period-preset {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--dim); font-size: 11px;
    padding: 4px 10px; cursor: pointer; transition: all .2s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .period-preset:hover { border-color: var(--accent); color: var(--text); }

  /* LAYOUT */
  main { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }
  .section { display: none; }
  .section.active { display: block; }

  /* CARD */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
  .card-title {
    font-family: 'Noto Serif JP', serif; font-size: 13px; color: var(--accent);
    letter-spacing: .2em; margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
  }
  .card-title::before { content:''; display:inline-block; width:3px; height:14px; background:var(--accent); border-radius:2px; }

  /* RANKING TABLE */
  .rank-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .rank-table th { padding: 8px 12px; text-align: right; color: var(--dim); font-weight: 400; font-size: 11px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .rank-table th:first-child, .rank-table th:nth-child(2) { text-align: left; }
  .rank-table td { padding: 10px 12px; text-align: right; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .rank-table td:first-child, .rank-table td:nth-child(2) { text-align: left; }
  .rank-table tr:last-child td { border-bottom: none; }
  .rank-table tr:hover td { background: var(--surface2); }
  .rank-badge { display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; border-radius:50%; font-size:11px; font-weight:700; }
  .rank-badge.r1 { background:#c8a200; color:#000; }
  .rank-badge.r2 { background:#9e9e9e; color:#000; }
  .rank-badge.r3 { background:#8d5e2a; color:#fff; }
  .rank-badge.rn { background:var(--surface2); color:var(--dim); }
  .pos { color: var(--green); } .neg { color: var(--red); }
  .name-cell { font-weight: 700; font-size: 14px; }

  /* MEMBER SORT */
  .member-sort-wrap { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
  .member-sort-label { font-size:12px; color:var(--dim); }
  #member-sort {
    background:var(--surface2); border:1px solid var(--border); border-radius:6px;
    color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:12px;
    padding:5px 10px; cursor:pointer; outline:none;
  }
  #member-sort:focus { border-color:var(--accent); }

  /* MEMBER GRID */
  .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 12px; margin-bottom: 24px; }
  .member-btn { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px; cursor:pointer; transition:all .2s; text-align:left; }
  .member-btn:hover { border-color: var(--accent); }
  .member-btn.active { border-color: var(--accent); background: var(--surface2); }
  .member-btn .m-name { font-weight:700; font-size:15px; color:var(--text); }
  .member-btn .m-score { font-size:18px; font-weight:700; margin-top:4px; }
  .member-btn .m-count { font-size:11px; color:var(--dim); margin-top:2px; }

  /* DETAIL */
  .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media(max-width:640px){ .detail-grid { grid-template-columns:1fr; } }
  .stat-block { background:var(--surface2); border-radius:10px; padding:16px; }
  .stat-block-title { font-size:11px; color:var(--dim); letter-spacing:.15em; margin-bottom:12px; }
  .stat-row { display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .stat-row:last-child { border-bottom:none; }
  .stat-label { color:var(--dim); } .stat-value { font-weight:700; }
  .rank-bar-wrap { margin-top:8px; }
  .rank-bar-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; font-size:12px; }
  .rank-bar-label { width:28px; color:var(--dim); flex-shrink:0; }
  .rank-bar-track { flex:1; background:var(--border); border-radius:4px; height:8px; overflow:hidden; }
  .rank-bar-fill { height:100%; border-radius:4px; transition:width .6s ease; }
  .rank-bar-pct { width:80px; text-align:right; color:var(--dim); flex-shrink:0; }
  .rank-bar-cnt { font-size:10px; color:var(--dim); margin-left:4px; opacity:.75; }

  /* GRAPH CONTROLS */
  .graph-controls { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; align-items:center; }
  .ctrl-btn {
    background:var(--surface2); border:1px solid var(--border); border-radius:6px;
    color:var(--dim); font-family:'Noto Sans JP',sans-serif; font-size:12px;
    padding:5px 12px; cursor:pointer; transition:all .2s;
  }
  .ctrl-btn:hover { border-color:var(--accent); color:var(--text); }
  .ctrl-btn.active { border-color:var(--accent); color:var(--accent); background:var(--surface); }
  .ctrl-sep { width:1px; height:20px; background:var(--border); flex-shrink:0; }
  .chart-wrap { position:relative; height:360px; }
  .member-charts-section { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:20px; }
  @media(max-width:768px){ .member-charts-section { grid-template-columns:1fr; } }
  .member-chart-block { background:var(--surface2); border-radius:10px; padding:16px; }
  .chart-wrap-sm { position:relative; height:200px; }

  /* HISTORY TABLE */
  .hist-table { width:100%; border-collapse:collapse; font-size:12px; }
  .hist-table th { padding:7px 10px; text-align:center; color:var(--dim); font-weight:400; font-size:11px; border-bottom:1px solid var(--border); }
  .hist-table td { padding:8px 10px; text-align:center; border-bottom:1px solid var(--border); }
  .hist-table tr:last-child td { border-bottom:none; }
  .hist-table tr:hover td { background:var(--surface2); }
  .hist-date { color:var(--dim); font-size:11px; }

  .empty { text-align:center; padding:60px 20px; color:var(--dim); font-size:14px; }

  /* SCHEDULE CALENDAR */
  .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .cal-month-label { font-family:'Noto Serif JP',serif; font-size:15px; color:var(--accent); letter-spacing:.05em; }
  .cal-nav { background:none; border:1px solid var(--border); color:var(--dim); border-radius:6px; padding:4px 12px; cursor:pointer; font-size:16px; transition:all .2s; }
  .cal-nav:hover { border-color:var(--accent); color:var(--text); }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .cal-dayname { text-align:center; font-size:11px; color:var(--dim); padding:4px 0 8px; }
  .cal-dayname.sun { color:#e06c75; }
  .cal-dayname.sat { color:#61afef; }
  .cal-cell { border-radius:8px; padding:8px 6px 10px; min-height:64px; display:flex; flex-direction:column; gap:4px; background:var(--surface2); border:1px solid transparent; }
  .cal-cell.empty-cell { background:none; border-color:transparent; }
  .cal-cell.mark-open  { background:rgba(152,195,121,.12); border-color:rgba(152,195,121,.35); }
  .cal-cell.mark-half  { background:rgba(97,175,239,.10); border-color:rgba(97,175,239,.30); }
  .cal-cell.mark-short { background:rgba(229,192,123,.12); border-color:rgba(229,192,123,.35); }
  .cal-cell.mark-closed{ background:rgba(224,108,117,.10); border-color:rgba(224,108,117,.25); }
  .cal-cell.today { box-shadow:0 0 0 2px var(--accent); }
  .cal-daynum { font-size:11px; color:var(--dim); line-height:1; }
  .cal-daynum.sun { color:#e06c75; }
  .cal-daynum.sat { color:#61afef; }
  .cal-mark { font-size:17px; line-height:1; text-align:center; }
  .cal-mark.mark-open  { color:#98c379; }
  .cal-mark.mark-half  { color:#61afef; }
  .cal-mark.mark-short { color:#e5c07b; }
  .cal-mark.mark-closed{ color:#e06c75; }
  .cal-note { font-size:10px; color:var(--dim); line-height:1.3; }
  .cal-rsv-badge { margin-top:auto; font-size:10px; color:var(--accent); font-weight:700; line-height:1; }
  .cal-legend { display:flex; gap:16px; flex-wrap:wrap; margin-top:16px; padding-top:14px; border-top:1px solid var(--border); }
  .cal-legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--dim); }
  @media(max-width:640px){
    .cal-cell { min-height:52px; padding:6px 4px 8px; gap:3px; }
    .cal-mark { font-size:15px; }
    .cal-note { font-size:9px; }
    .cal-daynum { font-size:10px; }
    .cal-legend { gap:10px; margin-top:12px; }
    .cal-legend-item { font-size:11px; }
  }

  /* RESERVATION MODALS */
  .rsv-overlay { display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,.75); align-items:center; justify-content:center; padding:16px; }
  .rsv-overlay.open { display:flex; }
  .rsv-modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; width:100%; max-width:480px; max-height:85vh; overflow-y:auto; padding:24px; }
  .rsv-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .rsv-title { font-family:'Noto Serif JP',serif; font-size:16px; color:var(--accent); letter-spacing:.1em; }
  .rsv-close { background:none; border:none; color:var(--dim); font-size:20px; cursor:pointer; padding:4px 8px; border-radius:6px; transition:all .2s; }
  .rsv-close:hover { color:var(--text); background:var(--surface2); }
  .rsv-screen { display:none; }
  .rsv-screen.active { display:block; }
  .rsv-date-info { background:var(--surface2); border-radius:10px; padding:14px 16px; margin-bottom:16px; display:flex; align-items:center; gap:12px; }
  .rsv-date-label { font-size:15px; font-weight:700; }
  .rsv-date-note { font-size:12px; color:var(--dim); margin-top:2px; }
  .rsv-section-title { font-size:12px; color:var(--dim); letter-spacing:.1em; margin-bottom:10px; }
  .rsv-card { background:var(--surface2); border-radius:8px; padding:12px 14px; margin-bottom:8px; }
  .rsv-card-name { font-size:14px; font-weight:700; margin-bottom:6px; }
  .rsv-card-cats { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:4px; }
  .rsv-tag { background:rgba(200,169,110,.15); border:1px solid rgba(200,169,110,.3); border-radius:4px; font-size:11px; color:var(--accent); padding:2px 8px; }
  .rsv-card-note { font-size:12px; color:var(--dim); }
  .rsv-card-actions { display:flex; gap:8px; margin-top:8px; }
  .rsv-edit-btn { padding:5px 12px; border-radius:6px; border:1px solid var(--accent); background:transparent; color:var(--accent); font-size:12px; cursor:pointer; }
  .rsv-cancel-btn { padding:5px 12px; border-radius:6px; border:1px solid var(--red); background:transparent; color:var(--red); font-size:12px; cursor:pointer; }
  .rsv-empty { text-align:center; padding:20px; color:var(--dim); font-size:13px; }
  .rsv-btn-row { display:flex; gap:10px; margin-top:16px; }
  .rsv-btn { flex:1; padding:11px; border-radius:8px; font-family:'Noto Sans JP',sans-serif; font-size:14px; cursor:pointer; transition:all .2s; border:1px solid; }
  .rsv-btn.primary { background:var(--accent); color:#000; border-color:var(--accent); font-weight:700; }
  .rsv-btn.primary:hover { opacity:.85; }
  .rsv-btn.primary:disabled { opacity:.5; cursor:not-allowed; }
  .rsv-btn.secondary { background:none; color:var(--text); border-color:var(--border); }
  .rsv-btn.secondary:hover { border-color:var(--accent); color:var(--accent); }
  .rsv-btn.x-post { background:none; color:var(--text); border-color:var(--border); flex:none; padding:11px 18px; }
  .rsv-btn.x-post:hover { border-color:var(--accent); color:var(--accent); }
  .rsv-form-group { margin-bottom:16px; }
  .rsv-label { font-size:12px; color:var(--dim); margin-bottom:7px; display:block; }
  .rsv-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; padding:10px 12px; font-family:'Noto Sans JP',sans-serif; }
  .rsv-input:focus { outline:none; border-color:var(--accent); }
  .rsv-checkbox-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .rsv-checkbox-item { display:flex; align-items:center; gap:8px; background:var(--surface2); border-radius:8px; padding:10px 12px; cursor:pointer; border:1px solid transparent; transition:all .2s; }
  .rsv-checkbox-item:hover { border-color:var(--border); }
  .rsv-checkbox-item input[type=checkbox] { accent-color:var(--accent); width:15px; height:15px; cursor:pointer; flex-shrink:0; }
  .rsv-checkbox-item span { font-size:13px; }
  .rsv-other-wrap { display:none; margin-top:8px; }
  .rsv-textarea { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; padding:10px 12px; font-family:'Noto Sans JP',sans-serif; min-height:80px; resize:vertical; }
  .rsv-textarea:focus { outline:none; border-color:var(--accent); }
  .rsv-confirm-row { display:flex; justify-content:space-between; align-items:flex-start; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px; gap:12px; }
  .rsv-confirm-row:last-child { border-bottom:none; }
  .rsv-confirm-key { color:var(--dim); flex-shrink:0; }
  .rsv-confirm-val { color:var(--text); text-align:right; word-break:break-word; }
  .rsv-list-item { padding:12px 14px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .2s; border-radius:8px; }
  .rsv-list-item:hover { background:var(--surface2); }
  .rsv-list-date { font-size:14px; font-weight:700; margin-bottom:3px; }
  .rsv-list-count { font-size:12px; color:var(--dim); }
  .cal-cell.clickable { cursor:pointer; }
  .cal-cell.clickable:hover { border-color:var(--accent) !important; }
  .rsv-list-btn-wrap { margin-bottom:12px; display:flex; justify-content:flex-end; gap:8px; }

  /* LOADING */
  #loading { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition:opacity .4s; }
  #loading .ld-logo { font-family:'Noto Serif JP',serif; font-size:36px; font-weight:900; color:var(--accent); margin-bottom:24px; letter-spacing:.2em; }
  #loading .ld-bar { width:200px; height:2px; background:var(--border); border-radius:2px; overflow:hidden; }
  #loading .ld-bar-inner { height:100%; background:var(--accent); animation:ldAnim 1.2s ease-in-out infinite; }
  @keyframes ldAnim { 0%{width:0%;margin-left:0} 50%{width:60%} 100%{width:0%;margin-left:100%} }
  #error-msg { display:none; background:rgba(230,57,70,.1); border:1px solid var(--red); border-radius:10px; padding:20px 24px; margin-bottom:24px; font-size:13px; color:var(--red); }
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* BOARD */
  .board-form { display:flex; flex-direction:column; gap:10px; margin-bottom:24px; }
  .board-form textarea {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-family:'Noto Sans JP',sans-serif;
    font-size:13px; padding:10px 14px; resize:vertical; min-height:80px;
    transition:border-color .2s; box-sizing:border-box;
  }
  .board-form textarea:focus { outline:none; border-color:var(--accent); }
  .board-form-footer { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .board-anon-label { font-size:12px; color:var(--dim); }
  .board-anon-name { font-size:12px; color:var(--accent); font-weight:700; }
  .board-submit {
    margin-left:auto; background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-family:'Noto Sans JP',sans-serif;
    font-size:13px; padding:8px 24px; cursor:pointer; transition:all .2s;
  }
  .board-submit:hover { border-color:var(--accent); color:var(--accent); }
  .board-submit:disabled { cursor:not-allowed; opacity:.4; }
  .board-comments { display:flex; flex-direction:column; gap:10px; }
  .board-comment {
    background:var(--surface2); border-radius:10px; padding:12px 16px;
    border-left:3px solid var(--border);
  }
  .board-comment-header { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
  .board-comment-name { font-size:12px; color:var(--accent); font-weight:700; }
  .board-comment-time { font-size:11px; color:var(--dim); }
  .board-comment-body { font-size:13px; line-height:1.6; white-space:pre-wrap; word-break:break-all; }
  .board-empty { text-align:center; padding:40px 0; color:var(--dim); font-size:13px; }
  #board-status { font-size:12px; color:var(--dim); padding:4px 0; }

  /* FEEDBACK FORM */
  .feedback-form { display:flex; flex-direction:column; gap:16px; max-width:560px; }
  .feedback-form label { font-size:12px; color:var(--dim); letter-spacing:.1em; margin-bottom:4px; display:block; }
  .feedback-form select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 10px;
    font-size: 13px;
    width: 100%;
    cursor: pointer;
  }
  .feedback-form select:focus { outline: none; border-color: var(--accent); }
  .feedback-form input[type=text],
  .feedback-form textarea {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-family:'Noto Sans JP',sans-serif;
    font-size:13px; padding:10px 14px; resize:vertical; transition:border-color .2s;
  }
  .feedback-form input[type=text]:focus,
  .feedback-form textarea:focus { outline:none; border-color:var(--accent); }
  .feedback-form textarea { min-height:120px; }
  .feedback-submit {
    align-self:flex-start; background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-family:'Noto Sans JP',sans-serif;
    font-size:13px; padding:9px 28px; cursor:pointer; transition:all .2s;
  }
  .feedback-submit:hover { border-color:var(--accent); color:var(--accent); }
  .feedback-submit:disabled { cursor:not-allowed; opacity:.4; color:var(--dim); border-color:var(--border); }
  #fb-status { font-size:13px; padding:8px 0; }
  .fb-file-label {
    display:inline-flex; align-items:center; gap:6px;
    background:var(--surface2); border:1px solid var(--border); border-radius:8px;

  /* ── MOBILE ── */

<main>

  <!-- 総合ランキング -->

  <!-- 掲示板 -->

  <!-- 連番募集 -->

      <button class="rsv-btn primary" style="flex:none;padding:8px 20px;" onclick="openRenbanForm()">募集を登録する</button>
    </div>
    <div class="card">
      <div class="card-title">連番募集一覧</div>
      <div class="renban-list" id="renban-list">

  <!-- ご意見・ご要望フォーム -->

            ファイルを選択

<script>
const DATA_URL = './data.json';
const COLORS = ['#c8a96e','#e63946','#4caf82','#42a5f5','#ab47bc','#ff7043','#26c6da','#d4e157','#ec407a','#26a69a'];
const COL_KEYS = ['総成績','4麻成績','3麻成績','総半荘数','4麻半荘数','3麻半荘数','総チップ','4麻チップ','3麻チップ','4麻飛び','3麻飛び','連対率','1着率','プレイ時間','来店回数','総収支'];
const COL_LABELS = {'総成績':'総成績','4麻成績':'4麻成績','3麻成績':'3麻成績','総半荘数':'半荘数(全)','4麻半荘数':'半荘数(4)','3麻半荘数':'半荘数(3)','総チップ':'チップ(全)','4麻チップ':'チップ(4)','3麻チップ':'チップ(3)','4麻飛び':'飛び(4)','3麻飛び':'飛び(3)','連対率':'連対率(4)','1着率':'1着率(3)','プレイ時間':'プレイ時間','来店回数':'来店','総収支':'収支'};

let DATA = null;
let filterStart = null;
let filterEnd   = null;
let activeMemberName = null;
let memberSortKey = 'allTotal';
let graphMembers = new Set();
let graphCol = '総成績';
let chartInstance = null;
let memberChartInstances = [];
let currentSection = 'ranking';

// ── ユーティリティ ──
const sc  = v => v > 0 ? 'pos' : v < 0 ? 'neg' : '';
const fmt = v => v > 0 ? '+'+v : String(v);
const fmtPct = v => (v*100).toFixed(1)+'%';
const toDate = s => new Date(s);
const dateStr = d => { const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; };
const rankBadge = r => { const c=r===1?'r1':r===2?'r2':r===3?'r3':'rn'; return `<span class="rank-badge ${c}">${r}</span>`; };

// ── データ読み込み ──
async function loadData() {
  try {
    const res = await fetch(DATA_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    DATA = await res.json();
  } catch(e) {
    document.getElementById('error-msg').innerHTML = '⚠ data.json の読み込みに失敗しました。<br>'+e.message;
    document.getElementById('error-msg').style.display = 'block';
  } finally {
    const el = document.getElementById('loading');
    el.style.opacity = '0';
    setTimeout(()=>el.style.display='none', 400);
  }
  if (!DATA) return;
  initPeriod();
  initGraphControls();
  refresh();
}

// ── 期間 ──
function initPeriod() {
  const dates = DATA.gathers.map(g=>g.date).sort();
  if (!dates.length) return;
  filterStart = toDate(dates[0]);
  filterEnd   = toDate(dates[dates.length-1]);
  document.getElementById('filter-start').value = dateStr(filterStart);
  document.getElementById('filter-end').value   = dateStr(filterEnd);

  const years = [...new Set(dates.map(d=>d.slice(0,4)))].sort();
  const btns = document.querySelector('.period-btns');
  years.forEach(y => {
    const b = document.createElement('button');
    b.className = 'period-preset';
    b.textContent = y+'年';
    b.onclick = () => setPeriod('year:'+y);
    btns.appendChild(b);
  });
}

function onPeriodChange() {
  const s = document.getElementById('filter-start').value;
  const e = document.getElementById('filter-end').value;
  filterStart = s ? toDate(s) : null;
  filterEnd   = e ? toDate(e) : null;
  refresh();
}

function setPeriod(preset) {
  const now = new Date();
  let start, end = now;
  if (preset==='all') {
    const dates = DATA.gathers.map(g=>g.date).sort();
    start = toDate(dates[0]); end = toDate(dates[dates.length-1]);
  } else if (preset.startsWith('year:')) {
    const y = preset.slice(5);
    start = new Date(y+'-01-01'); end = new Date(y+'-12-31');
  } else if (preset==='year') {
    start = new Date(now.getFullYear()+'-01-01');
  } else if (preset==='6m') {
    start = new Date(now.getFullYear(), now.getMonth()-6, now.getDate());
  } else if (preset==='3m') {
    start = new Date(now.getFullYear(), now.getMonth()-3, now.getDate());
  }
  filterStart = start; filterEnd = end;
  document.getElementById('filter-start').value = dateStr(filterStart);
  document.getElementById('filter-end').value   = dateStr(filterEnd);
  refresh();
}

function filteredGathers() {
  if (!DATA) return [];
  return DATA.gathers.filter(g => {
    const d = toDate(g.date);
    if (filterStart && d < filterStart) return false;
    if (filterEnd   && d > filterEnd)   return false;
    return true;
  });
}

// ── 集計（期間フィルター適用・JS側で計算） ──
function calcStats(memberName, gathers) {
  let allTotal=0,total4=0,total3=0,totalChip=0,totalChip4=0,totalChip3=0;
  let matchCountAll=0,matchCount4=0,matchCount3=0;
  let tobi4=0,tobi3=0,comeCount=0,totalM=0;
  let count12_4=0,count1_3=0;
  let c1_4=0,c2_4=0,c3_4=0,c4_4=0,c1_3=0,c2_3=0,c3_3=0;

  gathers.forEach(g => {
    const idx = g.members.indexOf(memberName);
    if (idx===-1) return;
    comeCount++;
    g.matches.forEach(m => {
      const sc = m.scores[idx]; const rk = m.ranks[idx];
      if (sc===null||sc===undefined) return;
      const cnt = m.scores.filter(s=>s!==null&&s!==undefined).length;
      allTotal+=sc; totalM+=sc*(g.rate||10); matchCountAll++;
      if (cnt===3) {
        total3+=sc;
        if (!m.isChip) { matchCount3++; if(rk===1)c1_3++;else if(rk===2)c2_3++;else if(rk===3)c3_3++; if(sc<=-70)tobi3++; if(rk===1)count1_3++; }
        if (m.isChip) totalChip3+=Math.floor(sc/2);
      } else {
        total4+=sc;
        if (!m.isChip) { matchCount4++; if(rk===1)c1_4++;else if(rk===2)c2_4++;else if(rk===3)c3_4++;else if(rk===4)c4_4++; if(sc<=-60)tobi4++; if(rk<=2)count12_4++; }
        if (m.isChip) totalChip4+=Math.floor(sc/2);
      }
      if (m.isChip) totalChip+=Math.floor(sc/2);
    });
  });

  const t4=c1_4+c2_4+c3_4+c4_4, t3=c1_3+c2_3+c3_3;
  const p=(n,t)=>t>0?Math.round(n/(t/100)*100)/100:0;
  return {
    name:memberName, allTotal,total4,total3,totalChip,totalChip4,totalChip3,
    matchCountAll,matchCount4,matchCount3,tobi4,tobi3,comeCount,totalM,
    rentairitsu:  matchCount4>0?count12_4/matchCount4:0,
    rentairitsu3: matchCount3>0?count1_3/matchCount3:0,
    res4:{count1:c1_4,count2:c2_4,count3:c3_4,count4:c4_4,percent1:p(c1_4,t4),percent2:p(c2_4,t4),percent3:p(c3_4,t4),percent4:p(c4_4,t4)},
    res3:{count1:c1_3,count2:c2_3,count3:c3_3,percent1:p(c1_3,t3),percent2:p(c2_3,t3),percent3:p(c3_3,t3)},
  };
}

function calcDataPoints(memberName, gathers) {
  const r={}; COL_KEYS.forEach(k=>r[k]=[]);
  let allTotal=0,total4=0,total3=0,totalChip=0,totalChip4=0,totalChip3=0;
  let matchCountAll=0,matchCount4=0,matchCount3=0,tobi4=0,tobi3=0,comeCount=0,totalM=0,count12_4=0,count1_3=0;
  [...gathers].sort((a,b)=>a.date.localeCompare(b.date)).forEach(g=>{
    const idx=g.members.indexOf(memberName); if(idx===-1)return; comeCount++;
    g.matches.forEach(m=>{
      const sc=m.scores[idx],rk=m.ranks[idx]; if(sc===null||sc===undefined)return;
      const cnt=m.scores.filter(s=>s!==null&&s!==undefined).length;
      allTotal+=sc; totalM+=sc*(g.rate||10); matchCountAll++;
      if(cnt===3){total3+=sc;if(!m.isChip){matchCount3++;if(sc<=-70)tobi3++;if(rk===1)count1_3++;}if(m.isChip)totalChip3+=Math.floor(sc/2);}
      else{total4+=sc;if(!m.isChip){matchCount4++;if(sc<=-60)tobi4++;if(rk<=2)count12_4++;}if(m.isChip)totalChip4+=Math.floor(sc/2);}
      if(m.isChip)totalChip+=Math.floor(sc/2);
    });
    const d=g.date;
    r['総成績'].push({date:d,value:allTotal}); r['4麻成績'].push({date:d,value:total4}); r['3麻成績'].push({date:d,value:total3});
    r['総半荘数'].push({date:d,value:matchCountAll}); r['4麻半荘数'].push({date:d,value:matchCount4}); r['3麻半荘数'].push({date:d,value:matchCount3});
    r['総チップ'].push({date:d,value:totalChip}); r['4麻チップ'].push({date:d,value:totalChip4}); r['3麻チップ'].push({date:d,value:totalChip3});
    r['4麻飛び'].push({date:d,value:tobi4}); r['3麻飛び'].push({date:d,value:tobi3});
    r['連対率'].push({date:d,value:matchCount4>0?count12_4/matchCount4:0});
    r['1着率'].push({date:d,value:matchCount3>0?count1_3/matchCount3:0});
    r['プレイ時間'].push({date:d,value:0}); r['来店回数'].push({date:d,value:comeCount}); r['総収支'].push({date:d,value:totalM});
  });
  return r;
}

// ── 営業予定カレンダー ──
let calYear  = new Date().getFullYear();
let calMonth = new Date().getMonth(); // 0-indexed

function moveCalMonth(diff) {
  calMonth += diff;
  if (calMonth > 11) { calMonth = 0;  calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCalendar();
}

async function renderCalendar() {
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  document.getElementById('cal-month-label').textContent =
    `${calYear}年 ${calMonth+1}月`;

  const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=日
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const MARKS = { '◎':'mark-open', '〇':'mark-half', '△':'mark-short', '×':'mark-closed' };
  const DAYNAMES = ['日','月','火','水','木','金','土'];

  // 今月の予約件数を取得
  const rsvCount = {};
  if (_db) {
    try {
      const startStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-01`;
      const endStr   = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(daysInMonth).padStart(2,'0')}`;
      const snap = await _db.collection('reservations')
        .where('date', '>=', startStr)
        .where('date', '<=', endStr)
        .get();
      snap.forEach(doc => {
        const d = doc.data().date;
        if (d) rsvCount[d] = (rsvCount[d] || 0) + 1;
      });
    } catch(e) { /* 取得失敗時は無視 */ }
  }

  let html = DAYNAMES.map((d,i)=>
    `<div class="cal-dayname${i===0?' sun':i===6?' sat':''}">${d}</div>`
  ).join('');

  // 月初の空白
  for (let i=0; i<firstDay; i++) html += `<div class="cal-cell empty-cell"></div>`;

  for (let d=1; d<=daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const entry   = SCHEDULE_DATA[dateStr];
    const mark    = entry ? entry.mark  : '';
    const note    = entry ? entry.note  : '';
    const cls     = MARKS[mark] || '';
    const dow     = new Date(calYear, calMonth, d).getDay();
    const dowCls  = dow===0?' sun':dow===6?' sat':'';
    const isToday = dateStr===todayStr ? ' today' : '';
    const cnt     = rsvCount[dateStr] || 0;
    html += `<div class="cal-cell ${cls}${isToday} clickable" onclick="openDayDetail('${dateStr}')">
      <span class="cal-daynum${dowCls}">${d}</span>
      ${mark ? `<span class="cal-mark ${cls}">${mark}</span>` : ''}
      ${note ? `<span class="cal-note">${note}</span>` : ''}
      ${cnt > 0 ? `<span class="cal-rsv-badge">予約${cnt}</span>` : ''}
    </div>`;
  }

  document.getElementById('cal-grid').innerHTML = html;
}

  if (memberSortKey === 'matchCount') return (b.matchCount4+b.matchCount3) - (a.matchCount4+a.matchCount3);
  return b[memberSortKey] - a[memberSortKey];
}

  if (memberSortKey === 'total4')    return { val: fmt(m.total4),  cls: sc(m.total4) };
  if (memberSortKey === 'total3')    return { val: fmt(m.total3),  cls: sc(m.total3) };

function fmtTick(ts, daySpan) {
  const d = new Date(ts);
  if (daySpan <= 90) return (d.getMonth()+1) + '/' + d.getDate();
  return d.getFullYear() + '/' + (d.getMonth()+1);
}
function fmtTooltipDate(ts) {
  const d = new Date(ts);
  return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
}

function renderMemberCharts(memberName) {
  memberChartInstances.forEach(c => c.destroy());
  memberChartInstances = [];
  const gathers = filteredGathers();
  const dp = calcDataPoints(memberName, gathers);
  const memberIdx = DATA.members.findIndex(m => m.name === memberName);
  const color = COLORS[memberIdx % COLORS.length];
  const allDates = gathers.map(g=>new Date(g.date)).filter(d=>!isNaN(d)).sort((a,b)=>a-b);
  const daySpan = allDates.length>=2 ? (allDates[allDates.length-1]-allDates[0])/(1000*60*60*24) : 365;
  [['mc-total','総成績'],['mc-4p','4麻成績'],['mc-3p','3麻成績']].forEach(([id,key])=>{
    const canvas = document.getElementById(id);
    if (!canvas) return;
    const pts = (dp[key]||[]).map(p=>({x:new Date(p.date).getTime(),y:p.value}));
    const c = new Chart(canvas.getContext('2d'),{
      type:'line', data:{datasets:[{label:key,data:pts,borderColor:color,backgroundColor:'transparent',pointBackgroundColor:color,borderWidth:2,pointRadius:2,tension:0.3}]},
      options:{
        responsive:true, maintainAspectRatio:false, parsing:false,
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{title:i=>fmtTooltipDate(i[0].parsed.x),label:c=>`${c.parsed.y}`}}
        },
        scales:{
          x:{type:'linear',ticks:{color:'#7a7060',maxRotation:0,autoSkip:true,maxTicksLimit:6,callback:v=>fmtTick(v,daySpan)},grid:{color:'#2a2a2a'}},
          y:{ticks:{color:'#7a7060'},grid:{color:c=>c.tick.value===0?'#888':'#2a2a2a',lineWidth:c=>c.tick.value===0?2:1}}
        }
      }
    });
    memberChartInstances.push(c);
  });
}

function renderChart(gathers) {
  if (!DATA) return;
  if (!gathers) gathers = filteredGathers();
  const ctx = document.getElementById('mainChart').getContext('2d');
  if (chartInstance) chartInstance.destroy();

  const datasets = DATA.members
    .filter(m=>graphMembers.has(m.name))
    .map((m,i) => {
      const ci = DATA.members.indexOf(m);
      const dp = calcDataPoints(m.name, gathers);
      const pts = (dp[graphCol]||[]).map(p=>({x: new Date(p.date).getTime(), y:p.value}));
      return { label:m.name, data:pts, borderColor:COLORS[ci%COLORS.length], backgroundColor:'transparent', pointBackgroundColor:COLORS[ci%COLORS.length], borderWidth:2, pointRadius:2, tension:0.3 };
    });

  const allDates = gathers.map(g=>new Date(g.date)).filter(d=>!isNaN(d)).sort((a,b)=>a-b);
  const daySpan = allDates.length >= 2
    ? (allDates[allDates.length-1] - allDates[0]) / (1000*60*60*24)
    : 365;
  chartInstance = new Chart(ctx, {
    type:'line', data:{datasets},
    options:{
      responsive:true, maintainAspectRatio:false, parsing:false,
      layout:{ padding:{ bottom:4 } },
      plugins:{
        legend:{
          position:'bottom', align:'start',
          labels:{
            color:'#e8e0d0', font:{family:'Noto Sans JP', size:11},
            boxWidth:20, boxHeight:2, padding:14,
          }
        },
        tooltip:{callbacks:{title:i=>fmtTooltipDate(i[0].parsed.x),label:c=>`${c.dataset.label}: ${c.parsed.y}`}}
      },
      scales:{
        x:{
          type:'linear',
          ticks:{ color:'#7a7060', maxRotation:0, autoSkip:true, maxTicksLimit:8, callback:v=>fmtTick(v,daySpan) },
          grid:{ color:'#2a2a2a' },
        },
        y:{ ticks:{color:'#7a7060'}, grid:{color:c=>c.tick.value===0?'#888':'#2a2a2a', lineWidth:c=>c.tick.value===0?2:1} }
      }
    }
  });
}

// ── 履歴（対局ごとにまとめて表示） ──
function buildHistory(gathers) {
  const rows = [];
  [...gathers].reverse().forEach(g => {
    const allMatches = g.matches.filter(m => m.scores.some(s=>s!==null&&s!==undefined));
    if (!allMatches.length) return;

    rows.push('<tr><td colspan="13" style="background:var(--surface2);color:var(--accent);font-size:12px;font-weight:700;padding:8px 14px;letter-spacing:.08em;border-bottom:1px solid var(--border);">'
      + g.date + '　' + g.members.filter(n=>n).join(' / ')
      + '</td></tr>');

    let hansoCount = 0;
    allMatches.forEach((m) => {
      const activeMems = g.members
        .map((name, idx) => ({name, score:m.scores[idx], rank:m.ranks[idx]}))
        .filter(x => x.score !== null && x.score !== undefined)
        .sort((a,b) => (b.score||0) - (a.score||0));

      const label = m.isChip
        ? 'チップ'
        : '第' + (++hansoCount) + '半荘';

        ? 'color:var(--dim);font-size:11px;padding-left:20px;font-style:italic'
        : 'color:var(--dim);font-size:11px;padding-left:20px';

      let row = '<tr><td class="hist-date" style="' + rowStyle + '">' + label + '</td>';
      activeMems.forEach(x => {
        row += '<td class="name-cell" style="font-size:12px;font-weight:700">' + x.name + '</td>';
        row += '<td class="' + sc(x.score) + '" style="font-weight:700">' + fmt(x.score) + '</td>';
        row += '<td style="color:var(--dim);font-size:11px">' + (m.isChip ? '—' : (x.rank??'-') + '着') + '</td>';
      });
      for (let i = activeMems.length; i < 4; i++) row += '<td></td><td></td><td></td>';
      rows.push(row + '</tr>');
    });
  });

  document.getElementById('hist-head').innerHTML =
    '<tr>'
    + '<th style="text-align:left;min-width:80px">半荘</th>'
    + '<th>名前</th><th>スコア</th><th>着順</th>'
    + '<th>名前</th><th>スコア</th><th>着順</th>'
    + '<th>名前</th><th>スコア</th><th>着順</th>'
    + '<th>名前</th><th>スコア</th><th>着順</th>'
    + '</tr>';

  document.getElementById('hist-body').innerHTML =
    rows.length ? rows.join('') : '<tr><td colspan="13" class="empty">この期間のデータなし</td></tr>';
}

async function postToX() {
  const dateStr = rsvCurrentDate;
  if (!dateStr) return;
  const parts = dateStr.split('-');
  const y = parseInt(parts[0]), mo = parseInt(parts[1]), d = parseInt(parts[2]);
  const entry = SCHEDULE_DATA[dateStr];
  const MARK_LABELS = { '◎':'終日営業', '〇':'半日以上', '△':'短時間のみ', '×':'お休み' };
  const MARK_COLORS = { '◎':'#98c379', '〇':'#61afef', '△':'#e5c07b', '×':'#e06c75' };
  const mark = entry ? entry.mark : '';
  const note = entry ? entry.note : '';
  const rsvs = _currentDayRsvData;

  const dpr = window.devicePixelRatio || 1;
  const W = 720, pad = 36, rowH = 34;
  const H = 170 + (rsvs.length > 0 ? rsvs.length * rowH + 24 : 48);
  const canvas = document.createElement('canvas');
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // 背景
  ctx.fillStyle = '#21252b';
  ctx.fillRect(0, 0, W, H);

  // 左アクセントバー
  const barColor = MARK_COLORS[mark] || '#528bff';
  ctx.fillStyle = barColor;
  ctx.fillRect(0, 0, 6, H);

  // 日付
  await document.fonts.ready;
  ctx.fillStyle = '#dde2ec';
  ctx.font = "bold 26px 'Noto Sans JP', sans-serif";
  ctx.fillText(`${y}年${mo}月${d}日`, pad, 50);

  // ステータス
  if (mark) {
    ctx.fillStyle = barColor;
    ctx.font = "bold 18px 'Noto Sans JP', sans-serif";
    ctx.fillText(`${mark}  ${MARK_LABELS[mark] || ''}`, pad, 86);
  }
  if (note) {
    ctx.fillStyle = '#7f848e';
    ctx.font = "14px 'Noto Sans JP', sans-serif";
    ctx.fillText(note, pad, 112);
  }

  // 区切り線
  ctx.strokeStyle = '#3a3f4b';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pad, 130); ctx.lineTo(W - pad, 130); ctx.stroke();

  // 予約リスト
  if (rsvs.length === 0) {
    ctx.fillStyle = '#5c6370';
    ctx.font = "16px 'Noto Sans JP', sans-serif";
    ctx.fillText('予約はありません', pad, 166);
  } else {
    ctx.fillStyle = '#5c6370';
    ctx.font = "13px 'Noto Sans JP', sans-serif";
    ctx.fillText(`${rsvs.length}件の予約`, pad, 154);
    rsvs.forEach((rsv, i) => {
      const ry = 154 + 24 + i * rowH;
      ctx.fillStyle = '#dde2ec';
      ctx.font = "bold 15px 'Noto Sans JP', sans-serif";
      ctx.fillText(rsv.name, pad, ry);
      if (rsv.cats.length) {
        const nameW = ctx.measureText(rsv.name).width;
        ctx.fillStyle = '#61afef';
        ctx.font = "13px 'Noto Sans JP', sans-serif";
        ctx.fillText('  ' + rsv.cats.join(' / '), pad + nameW, ry);
      }
    });
  }

  canvas.toBlob(async blob => {
    const file = new File([blob], `rsv-${dateStr}.png`, { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try { await navigator.share({ files: [file] }); return; } catch(e) { if (e.name === 'AbortError') return; }
    }
    // フォールバック：ダウンロード ＋ X投稿画面
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `rsv-${dateStr}.png`; a.click();
    URL.revokeObjectURL(url);
    setTimeout(() => window.open('https://x.com/intent/tweet', '_blank'), 400);
  }, 'image/png');
}

function populateDateSelect() {

  sel.innerHTML = '<option value="">日付を選択してください</option>';
  const DAYNAMES = ['日','月','火','水','木','金','土'];
  const today = new Date();
  for (let i = 0; i < 90; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    const dateStr = `${y}-${m}-${day}`;
    const entry = SCHEDULE_DATA[dateStr];
    if (!entry || entry.mark === '×') continue;
    const dayName = DAYNAMES[d.getDay()];
    const mark = entry ? ` ${entry.mark}` : '';
    const opt = document.createElement('option');
    opt.value = dateStr;
    opt.textContent = `${y}年${parseInt(m)}月${parseInt(day)}日（${dayName}）${mark}`;
    sel.appendChild(opt);
  }
}

// ── 掲示板 ──
let _boardAnonName = null;
let _boardInited = false;
let _boardUnsubscribe = null;

async function _getAnonName() {
  if (_boardAnonName) return _boardAnonName;
  try {
    const res = await fetch('https://api.ipify.org?format=json');
    const { ip } = await res.json();
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode('board:' + ip));
    const hex = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    _boardAnonName = 'ゲスト#' + hex.slice(0, 4).toUpperCase();
  } catch {
    _boardAnonName = 'ゲスト#' + Math.random().toString(16).slice(2,6).toUpperCase();
  }
  return _boardAnonName;
}

async function initBoard() {
  const nameEl = document.getElementById('board-anon-name');
  const name = await _getAnonName();
  nameEl.textContent = name;

  if (_boardInited) return;
  _boardInited = true;

  if (!_db) { document.getElementById('board-comments-list').innerHTML = '<div class="board-empty">Firebase未設定</div>'; return; }
  if (_boardUnsubscribe) _boardUnsubscribe();
  _boardUnsubscribe = _db.collection('board_comments')
    .orderBy('ts', 'desc')
    .limit(100)
    .onSnapshot(snap => {
      const list = document.getElementById('board-comments-list');
      if (snap.empty) { list.innerHTML = '<div class="board-empty">まだコメントがありません</div>'; return; }
      list.innerHTML = snap.docs.map(d => {
        const data = d.data();
        const ts = data.ts?.toDate ? data.ts.toDate() : new Date();
        const timeStr = `${ts.getFullYear()}/${String(ts.getMonth()+1).padStart(2,'0')}/${String(ts.getDate()).padStart(2,'0')} ${String(ts.getHours()).padStart(2,'0')}:${String(ts.getMinutes()).padStart(2,'0')}`;
        const body = (data.body||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        return `<div class="board-comment">
          <div class="board-comment-header">
            <span class="board-comment-name">${(data.name||'ゲスト').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>
            <span class="board-comment-time">${timeStr}</span>
          </div>
          <div class="board-comment-body">${body}</div>
        </div>`;
      }).join('');
    }, () => {
      document.getElementById('board-comments-list').innerHTML = '<div class="board-empty">読み込みに失敗しました</div>';
    });
}

async function submitBoardComment() {
  const input = document.getElementById('board-input');
  const btn = document.getElementById('board-submit-btn');
  const status = document.getElementById('board-status');
  const body = input.value.trim();
  if (!body) return;
  if (!_db) { status.textContent = 'Firebase未設定'; return; }
  btn.disabled = true; btn.textContent = '投稿中...';
  status.textContent = '';
  try {
    const name = await _getAnonName();
    await _db.collection('board_comments').add({ name, body, ts: firebase.firestore.FieldValue.serverTimestamp() });
    fetch('https://discord.com/api/webhooks/1486189645833441443/KBOhyzxqwrKZBOeO3rendcplyj4cSsCPaitB_VTghmHIMXQWvK5iC8-ZcA33Ex5vgD4Q', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: name, content: body })
    });
    input.value = '';
    _boardInited = false; // force re-listen on next init
    initBoard();
  } catch(e) {
    status.textContent = '投稿に失敗しました';
  } finally {
    btn.disabled = false; btn.textContent = '投稿';
  }
}

// ── キャンセル機能 ──
const ADMIN_PIN_HASH = '43634db94dac2798a47b6811705a7f6bdd1ff4a86ca3dbeb2f53c2f87684d3f1';
async function _hashPin(pin) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function _isAdminPin(pin) { return await _hashPin(pin) === ADMIN_PIN_HASH; }

// ── 連番募集 ──
let _rbCurrentEventId = null;
let _rbJoinType = null; // 'join' | 'interest'

function openRbModal() {
  document.getElementById('rb-overlay').classList.add('open');
}
function closeRbModal() {
  document.getElementById('rb-overlay').classList.remove('open');
}
function rbOverlayClick(e) {
  if (e.target === document.getElementById('rb-overlay')) closeRbModal();
}
function rbShowScreen(id) {
  document.querySelectorAll('#rb-overlay .rb-screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function initRenban() {
  if (!_db) {
    document.getElementById('renban-list').innerHTML = '<div class="renban-empty">データベース未接続</div>';
    return;
  }
  try {
    const snap = await _db.collection('renban_events').orderBy('date', 'asc').get();
    const events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderRenbanList(events);
  } catch(e) {
    document.getElementById('renban-list').innerHTML = '<div class="renban-empty">読み込みエラー: ' + e.message + '</div>';
  }
}

function renderRenbanList(events) {
  const el = document.getElementById('renban-list');
  const today = new Date(); today.setHours(0,0,0,0);
  if (!events.length) {
    el.innerHTML = '<div class="renban-empty">現在募集中のイベントはありません</div>';
    return;
  }
  el.innerHTML = events.map(ev => {
    const expired = ev.deadline ? new Date(ev.deadline) < today : false;
    const deadlineStr = ev.deadline ? ev.deadline : '期限なし';
    const maxStr = ev.maxPeople ? ev.maxPeople + '人まで' : '上限なし';
    return `<div class="renban-item" onclick="openRenbanDetail('${ev.id}')">
      <div class="renban-item-title">${escHtml(ev.title)}${expired ? ' <span class="rb-expired">期限切れ</span>' : ''}</div>
      <div class="renban-item-meta">
        <span>📅 ${ev.date}</span>
        <span>👥 ${maxStr}</span>
        <span>⏰ ${deadlineStr}</span>
      </div>
      ${ev.note ? '<div style="font-size:12px;color:var(--dim);margin-top:6px;">' + escHtml(ev.note) + '</div>' : ''}
    </div>`;
  }).join('');
}

function openRenbanForm() {
  document.getElementById('rb-event-title').value = '';
  document.getElementById('rb-event-date').value = '';
  document.getElementById('rb-event-max').value = '';
  document.getElementById('rb-event-deadline').value = '';
  document.getElementById('rb-event-note').value = '';
  document.getElementById('rb-form-status').textContent = '';
  const btn = document.getElementById('rb-form-submit-btn');
  btn.disabled = false; btn.textContent = '登録する';
  rbShowScreen('rb-form-screen');
  openRbModal();
}

async function submitRenbanEvent(e) {
  e.preventDefault();
  if (!_db) return;
  const btn = document.getElementById('rb-form-submit-btn');
  btn.disabled = true; btn.textContent = '登録中...';
  document.getElementById('rb-form-status').textContent = '';
  const title = document.getElementById('rb-event-title').value.trim();
  const date = document.getElementById('rb-event-date').value;
  const maxRaw = document.getElementById('rb-event-max').value.trim();
  const deadline = document.getElementById('rb-event-deadline').value || null;
  const note = document.getElementById('rb-event-note').value.trim();
  const maxPeople = maxRaw ? parseInt(maxRaw) : null;
  try {
    await _db.collection('renban_events').add({
      title, date, maxPeople, deadline, note,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    try {
      const lines = [
        `📢 **連番募集が登録されました**`,
        `🎫 **イベント名**: ${title}`,
        `📅 **日付**: ${date}`,
        `👥 **人数**: ${maxPeople ? maxPeople + '人まで' : '上限なし'}`,
        `⏰ **期限**: ${deadline || '期限なし'}`,
        note ? `📝 **備考**: ${note}` : null,
      ].filter(Boolean).join('\n');
      await fetch('https://discord.com/api/webhooks/1486240216544051210/afDq63OkXXpy-E-JAh2XbGdanIfymsKHHbMX4IBi6baaV86YiXdHX9LaMo5fdtonNRn4', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: lines })
      });
    } catch(e) { console.warn('Discord通知失敗:', e); }
    closeRbModal();
    initRenban();
  } catch(err) {
    document.getElementById('rb-form-status').textContent = 'エラー: ' + err.message;
    btn.disabled = false; btn.textContent = '登録する';
  }
}

async function openRenbanDetail(eventId) {
  if (!_db) return;
  _rbCurrentEventId = eventId;
  try {
    const docSnap = await _db.collection('renban_events').doc(eventId).get();
    if (!docSnap.exists) return;
    const ev = { id: docSnap.id, ...docSnap.data() };
    const today = new Date(); today.setHours(0,0,0,0);
    const expired = ev.deadline ? new Date(ev.deadline) < today : false;

    document.getElementById('rb-detail-title').textContent = ev.title;
    document.getElementById('rb-detail-info').innerHTML = `
      <div class="rb-detail-row"><span class="rb-detail-key">日付</span><span class="rb-detail-val">${ev.date}</span></div>
      <div class="rb-detail-row"><span class="rb-detail-key">募集人数</span><span class="rb-detail-val">${ev.maxPeople ? ev.maxPeople + '人まで' : '上限なし'}</span></div>
      <div class="rb-detail-row"><span class="rb-detail-key">募集期限</span><span class="rb-detail-val">${ev.deadline ? ev.deadline + (expired ? ' <span class="rb-expired">期限切れ</span>' : '') : '期限なし'}</span></div>
      ${ev.note ? '<div class="rb-detail-row"><span class="rb-detail-key">備考</span><span class="rb-detail-val">' + escHtml(ev.note) + '</span></div>' : ''}
    `;

    // 参加者読み込み
    const pSnap = await _db.collection('renban_events').doc(eventId).collection('participants').orderBy('createdAt', 'asc').get();
    const participants = pSnap.docs.map(d => d.data());
    const joins = participants.filter(p => p.type === 'join');
    const interests = participants.filter(p => p.type === 'interest');

    const renderPList = (list) => {
      if (!list.length) return '<div class="rb-no-participants">まだいません</div>';
      return list.map(p => `<div class="rb-participant-card">
        <div class="rb-participant-name">${escHtml(p.name)}</div>
        ${p.note ? '<div class="rb-participant-note">' + escHtml(p.note) + '</div>' : ''}
      </div>`).join('');
    };
    document.getElementById('rb-join-list').innerHTML = renderPList(joins);
    document.getElementById('rb-interest-list').innerHTML = renderPList(interests);

    // 期限切れなら参加ボタン無効化
    const joinBtn = document.querySelector('#rb-detail-screen .rb-btn.join');
    const interestBtn = document.querySelector('#rb-detail-screen .rb-btn.interest');
    joinBtn.disabled = expired; interestBtn.disabled = expired;

    rbShowScreen('rb-detail-screen');
    openRbModal();
  } catch(err) {
    alert('エラー: ' + err.message);
  }
}

function openRbJoinModal(type) {
  _rbJoinType = type;
  document.getElementById('rb-join-modal-title').textContent = type === 'join' ? '参加する' : '興味あり';
  document.getElementById('rb-join-name').value = '';
  document.getElementById('rb-join-note').value = '';
  document.getElementById('rb-join-status').textContent = '';
  const btn = document.getElementById('rb-join-submit-btn');
  btn.disabled = false; btn.textContent = '確定する';
  rbShowScreen('rb-join-screen');
}

async function submitRbParticipation() {
  if (!_db || !_rbCurrentEventId || !_rbJoinType) return;
  const btn = document.getElementById('rb-join-submit-btn');
  const name = document.getElementById('rb-join-name').value.trim();
  const note = document.getElementById('rb-join-note').value.trim();
  if (!name) { document.getElementById('rb-join-status').textContent = '名前を入力してください'; return; }
  btn.disabled = true; btn.textContent = '送信中...';
  document.getElementById('rb-join-status').textContent = '';
  try {
    await _db.collection('renban_events').doc(_rbCurrentEventId).collection('participants').add({
      name, note, type: _rbJoinType,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    // 詳細画面に戻って更新
    await openRenbanDetail(_rbCurrentEventId);
  } catch(err) {
    document.getElementById('rb-join-status').textContent = 'エラー: ' + err.message;
    btn.disabled = false; btn.textContent = '確定する';
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

          <input type="text" id="rb-event-title" class="rb-input" placeholder="例：○○ライブ 東京公演" required>
        </div>
        <div class="rb-form-group">
          <label class="rb-label">日付 <span style="color:var(--red)">*</span></label>
          <input type="date" id="rb-event-date" class="rb-input" required>
        </div>
        <div class="rb-form-group">
          <label class="rb-label">募集人数（空欄で上限なし）</label>
          <input type="number" id="rb-event-max" class="rb-input" placeholder="例：2" min="1">
        </div>
        <div class="rb-form-group">
          <label class="rb-label">募集期限（空欄で期限なし）</label>
          <input type="date" id="rb-event-deadline" class="rb-input">
        </div>
        <div class="rb-form-group">
          <label class="rb-label">備考</label>
          <textarea id="rb-event-note" class="rb-textarea" placeholder="座席や時間帯など自由に入力"></textarea>
        </div>
        <div id="rb-form-status" style="font-size:12px;color:var(--red);min-height:18px;margin-bottom:4px;"></div>
        <div class="rb-btn-row">
          <button type="button" class="rb-btn secondary" onclick="closeRbModal()">キャンセル</button>
          <button type="submit" class="rb-btn primary" id="rb-form-submit-btn">登録する</button>
        </div>
      </form>
    </div>

    <!-- イベント詳細 -->
    <div id="rb-detail-screen" class="rb-screen">
      <div class="rb-header">
        <span class="rb-title" id="rb-detail-title"></span>
        <button class="rb-close" onclick="closeRbModal()">✕</button>
      </div>
      <div id="rb-detail-info" class="rb-detail-info"></div>
      <div class="rb-btn-row" style="margin-top:0;margin-bottom:4px;">
        <button class="rb-btn join" onclick="openRbJoinModal('join')">参加する</button>
        <button class="rb-btn interest" onclick="openRbJoinModal('interest')">興味あり</button>
      </div>
      <div class="rb-section-label">参加者</div>
      <div id="rb-join-list" class="rb-participants"></div>
      <div class="rb-section-label">興味あり</div>
      <div id="rb-interest-list" class="rb-participants"></div>
      <div class="rb-btn-row" style="margin-top:16px;">
        <button class="rb-btn secondary" onclick="closeRbModal()">閉じる</button>
      </div>
    </div>

    <!-- 参加 / 興味あり フォーム -->
    <div id="rb-join-screen" class="rb-screen">
      <div class="rb-header">
        <span class="rb-title" id="rb-join-modal-title"></span>
        <button class="rb-close" onclick="closeRbModal()">✕</button>
      </div>
      <div class="rb-form-group">
        <label class="rb-label">名前 <span style="color:var(--red)">*</span></label>
        <input type="text" id="rb-join-name" class="rb-input" placeholder="匿名も可" required>
      </div>
      <div class="rb-form-group">
        <label class="rb-label">備考（空欄可）</label>
        <textarea id="rb-join-note" class="rb-textarea" placeholder="一言メモなど"></textarea>
      </div>
      <div id="rb-join-status" style="font-size:12px;color:var(--red);min-height:18px;margin-bottom:4px;"></div>
      <div class="rb-btn-row">
        <button class="rb-btn secondary" onclick="rbShowScreen('rb-detail-screen')">戻る</button>
        <button class="rb-btn primary" id="rb-join-submit-btn" onclick="submitRbParticipation()">確定する</button>
      </div>
    </div>

  </div>
</div>

<!-- ── 編集PINモーダル ── -->
<div id="edit-pin-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:var(--card);border-radius:12px;padding:24px;width:min(320px,90vw);box-shadow:0 8px 32px rgba(0,0,0,.5);">
    <div style="font-weight:700;font-size:15px;margin-bottom:16px;">予約を編集</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:12px;">キャンセルPINを入力してください</div>
    <input type="password" id="edit-pin-input" inputmode="numeric" placeholder="PIN" style="width:100%;box-sizing:border-box;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:16px;margin-bottom:8px;">
    <div id="edit-pin-error" style="color:var(--red);font-size:12px;min-height:16px;margin-bottom:12px;"></div>
    <div style="display:flex;gap:8px;">
      <button onclick="closeEditPinModal()" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:14px;">戻る</button>
      <button id="edit-pin-confirm-btn" onclick="confirmEditPin()" style="flex:1;padding:10px;border-radius:8px;border:none;background:var(--accent);color:#1a1610;cursor:pointer;font-size:14px;font-weight:700;">確認する</button>
    </div>
  </div>
</div>

<!-- ── キャンセルPINモーダル ── -->
<div id="cancel-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:var(--card);border-radius:12px;padding:24px;width:min(320px,90vw);box-shadow:0 8px 32px rgba(0,0,0,.5);">
    <div style="font-weight:700;font-size:15px;margin-bottom:16px;">予約キャンセル</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:12px;">キャンセルPINを入力してください</div>
    <input type="password" id="cancel-pin-input" inputmode="numeric" placeholder="PIN" style="width:100%;box-sizing:border-box;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:16px;margin-bottom:8px;">
    <div id="cancel-error" style="color:var(--red);font-size:12px;min-height:16px;margin-bottom:12px;"></div>
    <div style="display:flex;gap:8px;">
      <button onclick="closeCancelModal()" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:14px;">戻る</button>
      <button id="cancel-confirm-btn" onclick="confirmCancel()" style="flex:1;padding:10px;border-radius:8px;border:none;background:var(--red);color:#fff;cursor:pointer;font-size:14px;font-weight:700;">キャンセルする</button>
    </div>
  </div>
</div>
</body>
</html>
